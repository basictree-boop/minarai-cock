<!-- Firebase CDN（type="module"不要・iOSでも動く） -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyBGeyuH82FM5UFP9NqC2XN4PfrbXoqt0hc",
    authDomain:        "miranai-cock.firebaseapp.com",
    projectId:         "miranai-cock",
    storageBucket:     "miranai-cock.firebasestorage.app",
    messagingSenderId: "232749004308",
    appId:             "1:232749004308:web:daca1b3c7c309e85bd5901",
    measurementId:     "G-H1GMN5BW8X"
  };
  firebase.initializeApp(firebaseConfig);
  const db  = firebase.firestore();
  const COL = "records";

  // Cloudinary設定
  const CLOUDINARY_CLOUD  = "dmwdq9qjz";
  const CLOUDINARY_PRESET = "minarai-cock";

  function updateSyncStatus(status) {
    const el = document.getElementById("sync-status");
    if (!el) return;
    const map = {
      synced:  { text: "☁️ 同期かんりょう",   color: "#42C878" },
      saving:  { text: "⏳ 保存ちゅう...",     color: "#FF8C42" },
      error:   { text: "⚠️ オフライン",        color: "#FF5C8A" },
      loading: { text: "🔄 よみこみちゅう...", color: "#C8B3FF" },
    };
    const s = map[status] || map.loading;
    el.textContent = s.text;
    el.style.background = s.color;
  }

  updateSyncStatus("loading");

  db.collection(COL).orderBy("createdAt", "desc").onSnapshot(
    (snap) => {
      window._records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (typeof renderRecords === "function") renderRecords();
      if (typeof cvRefreshQueue === "function") cvRefreshQueue();
      updateSyncStatus("synced");
    },
    (err) => { console.error(err); updateSyncStatus("error"); }
  );

  window.dbSave = async (data) => {
    updateSyncStatus("saving");
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    return await db.collection(COL).add(data);
  };

  // 画像をCloudinaryにアップロードしてURLを返す
  window.uploadPhoto = async (dataUrl) => {
    if (!dataUrl) return null;
    // base64 → Blob に変換してからアップロード（iOS Safari対応）
    const byteStr = atob(dataUrl.split(',')[1]);
    const mime    = dataUrl.split(',')[0].split(':')[1].split(';')[0];
    const arr     = new Uint8Array(byteStr.length);
    for (let i = 0; i < byteStr.length; i++) arr[i] = byteStr.charCodeAt(i);
    const blob = new Blob([arr], { type: mime });

    const formData = new FormData();
    formData.append("file", blob, "photo.jpg");
    formData.append("upload_preset", CLOUDINARY_PRESET);
    formData.append("folder", "minarai-cock");
    const res = await fetch(
      "https://api.cloudinary.com/v1_1/" + CLOUDINARY_CLOUD + "/image/upload",
      { method: "POST", body: formData }
    );
    if (!res.ok) {
      const err = await res.text();
      throw new Error("写真のアップロードにしっぱいしたよ: " + err);
    }
    const json = await res.json();
    return json.secure_url;
  };

  window.dbDelete = async (id) => {
    await db.collection(COL).doc(id).delete();
  };
</script>

  /* うさぎ */
  .cv-bunny-wrap {
    position: absolute;
    left: 14px;
    bottom: 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 20;

    font-size: 46px;

  .cv-bunny.happy      { animation: bunnyHappy .45s ease-in-out; }
  .cv-bunny.bounce-in  { animation: bunnyBounce .45s ease-out; }
  @keyframes nomNom     { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(.78) translateY(5px)} }
  @keyframes bunnyHappy { 0%,100%{transform:rotate(0) scale(1)} 30%{transform:rotate(-18deg) scale(1.15)} 70%{transform:rotate(18deg) scale(1.15)} }
  @keyframes bunnyBounce { 0%{transform:translateY(18px) scale(.8)} 55%{transform:translateY(-10px) scale(1.08)} 100%{transform:translateY(0) scale(1)} }

    position: fixed; /* fixedにして overflow:hidden の制約を完全に回避 */
    background: white;

<script>
window._records = [];
let currentFilter = 'all';
const starState = { 'r-stars': 0, 'f-stars': 0 };

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector('.nav-btn.' + page).classList.add('active');
  if (page === 'view') renderRecords();
  if (typeof cvReact === 'function') cvReact(page === 'quiz' ? 'quiz' : 'page');
}

function togCat(btn, groupId, cls) { btn.classList.toggle(cls); }
function togSingle(btn, groupId, cls) {
  document.querySelectorAll('#' + groupId + ' .tog-btn').forEach(b => b.classList.remove(cls));
  btn.classList.add(cls);
}
function getSelected(groupId, cls) {
  return Array.from(document.querySelectorAll('#' + groupId + ' .' + cls)).map(b => b.textContent.trim()).join(', ');
}

function setStars(id, val) {
  starState[id] = val;
  document.querySelectorAll('#' + id + ' .star-btn').forEach((b, i) => b.classList.toggle('active', i < val));
}

function previewPhoto(input, previewId, dataId, hintId) {
  if (!input.files[0]) return;
  const MAX_PX = 800, MAX_KB = 700;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > MAX_PX || h > MAX_PX) {
        if (w > h) { h = Math.round(h * MAX_PX / w); w = MAX_PX; }
        else       { w = Math.round(w * MAX_PX / h); h = MAX_PX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let quality = 0.85;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length > MAX_KB * 1024 * 1.37 && quality > 0.3) {
        quality -= 0.1;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      document.getElementById(previewId).src = dataUrl;
      document.getElementById(previewId).style.display = 'block';
      document.getElementById(dataId).value = dataUrl;
      document.getElementById(hintId).style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function addIngredient() {
  const list = document.getElementById('ingredients-list');
  const row = document.createElement('div');
  row.className = 'ingredient-row';
  row.innerHTML = '<input type="text" placeholder="材料の名前"><input type="text" class="ingredient-amount" placeholder="量"><button class="btn-remove" onclick="removeRow(this,\'ingredients-list\')">✕</button>';
  list.appendChild(row);
}
function removeRow(btn, listId) {
  const list = document.getElementById(listId);
  if (list.children.length > 1) btn.parentElement.remove();
}
function addStep() {
  const list = document.getElementById('steps-list');
  const num = list.children.length + 1;
  const row = document.createElement('div');
  row.className = 'step-row';
  row.innerHTML = '<div class="step-number">' + num + '</div><textarea placeholder="次にすること..."></textarea><button class="btn-remove" onclick="removeStep(this)">✕</button>';
  list.appendChild(row);
}
function removeStep(btn) {
  const list = document.getElementById('steps-list');
  if (list.children.length > 1) {
    btn.parentElement.remove();
    list.querySelectorAll('.step-number').forEach((n, i) => n.textContent = i + 1);
  }
}

// 二重登録防止
let isSaving = false;
function lockUI(msg) {
  isSaving = true;
  document.querySelectorAll('.nav-btn, .btn-save, .btn-add').forEach(b => b.disabled = true);
  const o = document.createElement('div');
  o.id = 'saving-overlay';
  o.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;';
  o.innerHTML = '<div style="background:white;border-radius:24px;padding:28px 36px;font-family:\'M PLUS Rounded 1c\',sans-serif;font-size:18px;font-weight:900;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3);">' + msg + '</div>';
  document.body.appendChild(o);
}
function unlockUI() {
  isSaving = false;
  document.querySelectorAll('.nav-btn, .btn-save, .btn-add').forEach(b => b.disabled = false);
  const o = document.getElementById('saving-overlay');
  if (o) o.remove();
}

async function saveRecipe() {
  if (isSaving) return;
  const name = document.getElementById('r-name').value.trim();
  if (!name) { alert('🐰 料理の名前をかいてね！'); return; }
  lockUI('⏳ レシピを保存ちゅう...');
  const ingredients = [];
  document.querySelectorAll('#ingredients-list .ingredient-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    if (inputs[0].value.trim()) ingredients.push({ name: inputs[0].value.trim(), amount: inputs[1].value.trim() });
  });
  const steps = [];
  document.querySelectorAll('#steps-list textarea').forEach(ta => { if (ta.value.trim()) steps.push(ta.value.trim()); });
  try {
    const photoDataUrl = document.getElementById('r-photo-data').value;
    // 編集モードの場合は既存ドキュメントを更新
    if (editingId) {
      const updateData = {
        name,
        date: document.getElementById('r-date').value || today(),
        category: getSelected('r-category','sel-green'),
        time: document.getElementById('r-time').value,
        difficulty: getSelected('r-difficulty','sel-yellow'),
        servings: document.getElementById('r-servings').value,
        ingredients, steps,
        tips: document.getElementById('r-tips').value.trim(),
        review: document.getElementById('r-review').value.trim(),
        stars: starState['r-stars'],
      };
      // 新しい写真が選ばれた場合のみアップロード
      if (photoDataUrl && !photoDataUrl.startsWith('http')) {
        const photoUrl = await window.uploadPhoto(photoDataUrl);
        updateData.photo = photoUrl;
      }
      await firebase.firestore().collection('records').doc(editingId).update(updateData);
      editingId = null;
      document.getElementById('r-save-btn').textContent = '🐰 レシピを保存する！';
      document.getElementById('r-save-btn').style.background = '';
      const banner = document.getElementById('edit-banner');
      if (banner) banner.remove();
      showToast('✏️ レシピを更新したよ！');
      if (typeof cvReact === 'function') cvReact('save');
      resetRecipeForm();
    } else {
      // 新規保存
      const photoDataUrlNew = photoDataUrl;
      const docRef = await window.dbSave({
        type: 'recipe', name,
        date: document.getElementById('r-date').value || today(),
        category: getSelected('r-category','sel-green'),
        time: document.getElementById('r-time').value,
        difficulty: getSelected('r-difficulty','sel-yellow'),
        servings: document.getElementById('r-servings').value,
        ingredients, steps,
        tips: document.getElementById('r-tips').value.trim(),
        review: document.getElementById('r-review').value.trim(),
        stars: starState['r-stars'],
        photo: null,
      });
      if (photoDataUrlNew) {
        const photoUrl = await window.uploadPhoto(photoDataUrlNew);
        await docRef.update({ photo: photoUrl });
      }
      showToast('🐰 レシピを保存したよ！');
      if (typeof cvReact === 'function') cvReact('save');
      resetRecipeForm();
    }
  } catch(e) {
    alert('保存にしっぱいしたよ。もういちどためしてね。\n' + e.message);
  } finally {
    unlockUI();
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRecords();
}

function renderRecords() {
  const grid = document.getElementById('records-grid');
  const search = document.getElementById('search-input').value.toLowerCase();
  const dateFrom = document.getElementById('date-from').value;
  const dateTo = document.getElementById('date-to').value;
  const filtered = (window._records || []).filter(r => {
    if (currentFilter !== 'all' && r.type !== currentFilter) return false;
    if (search && !r.name.toLowerCase().includes(search)) return false;
    if (dateFrom && r.date < dateFrom) return false;
    if (dateTo && r.date > dateTo) return false;
    return true;
  });
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><span class="ei">🐰</span><p>記録がみつからないよ！<br>①か②で最初の記録をしよう！</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(r => {
    const stars = '⭐'.repeat(r.stars || 0);
    const hasPhoto = r.photo && r.photo.startsWith('http');
    const thumbHtml = hasPhoto
      ? '<div class="record-thumb"><img src="' + r.photo + '" alt="' + escHtml(r.name) + '" loading="lazy"></div>'
      : '<div class="record-thumb">' + (r.type === 'recipe' ? '📖' : '🍽️') + '</div>';
    const badge = r.type === 'recipe'
      ? '<span class="record-type-badge badge-recipe">📖 レシピ</span>'
      : '<span class="record-type-badge badge-food">🍽️ 食べたもの</span>';
    const sub = r.location ? '<div style="font-size:11px;color:#888;margin-bottom:3px;">' + r.location + (r.locationDetail ? ' ・ ' + r.locationDetail : '') + '</div>' : '';
    return '<div class="record-card' + (!hasPhoto ? ' no-photo' : '') + '" onclick="openModal(\'' + r.id + '\')">'
      + thumbHtml + '<div class="record-body">' + badge
      + '<div class="record-title">' + escHtml(r.name) + '</div>'
      + sub + '<div class="record-date">📅 ' + fmtDate(r.date) + '</div>'
      + '<div style="font-size:14px;">' + stars + '</div>'
      + (r.review ? '<div class="record-note">' + escHtml(r.review) + '</div>' : '')
      + '</div></div>';
  }).join('');
}

function openModal(id) {
  const r = (window._records || []).find(r => r.id === id);
  if (!r) return;
  const stars = '⭐'.repeat(r.stars || 0);
  const badge = r.type === 'recipe'
    ? '<span class="record-type-badge badge-recipe">📖 レシピ</span>'
    : '<span class="record-type-badge badge-food">🍽️ 食べたもの</span>';
  let html = '';
  if (r.photo) html += '<img class="modal-img" src="' + r.photo + '" alt="' + escHtml(r.name) + '">';
  html += badge + '<div class="modal-title">' + escHtml(r.name) + '</div>';
  html += '<div style="color:#999;font-size:13px;margin-bottom:8px;">📅 ' + fmtDate(r.date) + '</div>';
  if (stars) html += '<div style="font-size:20px;margin-bottom:10px;">' + stars + '</div>';
  if (r.type === 'recipe') {
    if (r.category)   html += sec('🍳 ジャンル', tag(r.category));
    if (r.difficulty) html += sec('😤 むずかしさ', tag(r.difficulty));
    const info = [r.time && '⏱ ' + r.time + '分', r.servings && '👥 ' + r.servings + '人分'].filter(Boolean).join(' ');
    if (info) html += sec('📏 じょうほう', tag(info));
    if (r.ingredients && r.ingredients.length) {
      html += '<div class="modal-sec"><div class="modal-sec-title">🛒 材料</div>' + r.ingredients.map(i => tag(i.name + ' ' + i.amount)).join('') + '</div>';
    }
    if (r.steps && r.steps.length) {
      html += '<div class="modal-sec"><div class="modal-sec-title">📝 作り方</div>';
      r.steps.forEach((s,i) => { html += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;"><span style="background:var(--orange);color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;">' + (i+1) + '</span><span style="font-size:14px;">' + escHtml(s) + '</span></div>'; });
      html += '</div>';
    }
    if (r.tips) html += sec('💡 コツ・ポイント', '<div style="font-size:14px;">' + escHtml(r.tips) + '</div>');
  } else {
    const loc = [r.location, r.locationDetail].filter(Boolean).join(' ・ ');
    if (loc)       html += sec('📍 食べた場所', tag(loc));
    if (r.maker)   html += sec('👨‍🍳 作った人', tag(r.maker));
    if (r.cuisine) html += sec('🍳 料理の種類', tag(r.cuisine));
    if (r.again)   html += sec('🔄 また食べたい？', tag(r.again));
  }
  if (r.review) html += sec('💬 感想', '<div style="font-size:14px;line-height:1.6;">' + escHtml(r.review) + '</div>');
  html += '<div style="display:flex;gap:10px;margin-top:20px;">';
  html += '<button onclick="editRecord(\'' + r.id + '\')" style="flex:1;padding:12px;background:var(--mint);border:none;border-radius:14px;font-family:\'M PLUS Rounded 1c\',sans-serif;font-size:14px;font-weight:700;cursor:pointer;color:#2a7a4a;">✏️ 編集する</button>';
  html += '<button onclick="deleteRecord(\'' + r.id + '\')" style="flex:1;padding:12px;background:var(--pink);border:none;border-radius:14px;font-family:\'M PLUS Rounded 1c\',sans-serif;font-size:14px;font-weight:700;cursor:pointer;color:var(--red);">🗑️ けす</button>';
  html += '</div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function sec(title, content) { return '<div class="modal-sec"><div class="modal-sec-title">' + title + '</div>' + content + '</div>'; }
function tag(text) { return '<span class="modal-tag">' + escHtml(text) + '</span>'; }

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

// 編集中のレコードID
let editingId = null;

function editRecord(id) {
  const r = (window._records || []).find(r => r.id === id);
  if (!r) return;
  closeModal();
  editingId = id;

  if (r.type === 'recipe') {
    showPage('recipe');
    // フォームにデータを流し込む
    document.getElementById('r-name').value  = r.name || '';
    document.getElementById('r-date').value  = r.date || today();
    document.getElementById('r-time').value  = r.time || '';
    document.getElementById('r-servings').value = r.servings || '';
    document.getElementById('r-tips').value  = r.tips || '';
    document.getElementById('r-review').value = r.review || '';
    // カテゴリ
    document.querySelectorAll('#r-category .tog-btn').forEach(b => {
      if ((r.category || '').includes(b.textContent.trim())) b.classList.add('sel-green');
    });
    // むずかしさ
    document.querySelectorAll('#r-difficulty .tog-btn').forEach(b => {
      if ((r.difficulty || '').includes(b.textContent.trim())) b.classList.add('sel-yellow');
    });
    // 星
    setStars('r-stars', r.stars || 0);
    // 材料
    if (r.ingredients && r.ingredients.length) {
      document.getElementById('ingredients-list').innerHTML = r.ingredients.map(i =>
        '<div class="ingredient-row"><input type="text" value="' + escHtml(i.name) + '" placeholder="材料の名前"><input type="text" class="ingredient-amount" value="' + escHtml(i.amount) + '" placeholder="量"><button class="btn-remove" onclick="removeRow(this,\'ingredients-list\')">✕</button></div>'
      ).join('');
    }
    // 手順
    if (r.steps && r.steps.length) {
      document.getElementById('steps-list').innerHTML = r.steps.map((s, i) =>
        '<div class="step-row"><div class="step-number">' + (i+1) + '</div><textarea placeholder="次にすること...">' + escHtml(s) + '</textarea><button class="btn-remove" onclick="removeStep(this)">✕</button></div>'
      ).join('');
    }
    // 写真
    if (r.photo) {
      document.getElementById('r-preview').src = r.photo;
      document.getElementById('r-preview').style.display = 'block';
      document.getElementById('r-hint').style.display = 'none';
      document.getElementById('r-photo-data').value = r.photo;
    }
    // 保存ボタンを「更新」表示に
    document.getElementById('r-save-btn').textContent = '✏️ レシピを更新する！';
    document.getElementById('r-save-btn').style.background = 'linear-gradient(135deg,#42a5f5,#1565c0)';
    // 編集中バナーを表示
    showEditBanner('recipe');

  } else {
    showPage('food');
    document.getElementById('f-name').value  = r.name || '';
    document.getElementById('f-date').value  = r.date || today();
    document.getElementById('f-location-detail').value = r.locationDetail || '';
    document.getElementById('f-review').value = r.review || '';
    // 場所
    document.querySelectorAll('#f-location-btns .tog-btn').forEach(b => {
      if ((r.location || '').includes(b.textContent.trim())) b.classList.add('sel-loc');
    });
    // 作った人
    document.querySelectorAll('#f-maker .tog-btn').forEach(b => {
      if ((r.maker || '').includes(b.textContent.trim())) b.classList.add('sel-green');
    });
    // 料理の種類
    document.querySelectorAll('#f-cuisine .tog-btn').forEach(b => {
      if ((r.cuisine || '').includes(b.textContent.trim())) b.classList.add('sel-green');
    });
    // また食べたい
    document.querySelectorAll('#f-again .tog-btn').forEach(b => {
      if ((r.again || '').includes(b.textContent.trim())) b.classList.add('sel-orange');
    });
    // 星
    setStars('f-stars', r.stars || 0);
    // 写真
    if (r.photo) {
      document.getElementById('f-preview').src = r.photo;
      document.getElementById('f-preview').style.display = 'block';
      document.getElementById('f-hint').style.display = 'none';
      document.getElementById('f-photo-data').value = r.photo;
    }
    document.getElementById('f-save-btn').textContent = '✏️ 記録を更新する！';
    document.getElementById('f-save-btn').style.background = 'linear-gradient(135deg,#42a5f5,#1565c0)';
    showEditBanner('food');
  }
}

function showEditBanner(type) {
  const pageId = 'page-' + type;
  if (document.getElementById('edit-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'edit-banner';
  banner.style.cssText = 'background:#42a5f5;color:white;text-align:center;padding:10px;font-weight:900;font-size:14px;border-radius:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;';
  banner.innerHTML = '<span>✏️ 編集モード中</span><button onclick="cancelEdit()" style="background:rgba(255,255,255,.3);border:none;border-radius:8px;padding:4px 10px;font-family:\'M PLUS Rounded 1c\',sans-serif;font-weight:700;color:white;cursor:pointer;">キャンセル</button>';
  const card = document.querySelector('#' + pageId + ' .card');
  card.insertBefore(banner, card.firstChild);
}

function cancelEdit() {
  const type = editingId && (window._records||[]).find(r=>r.id===editingId)?.type;
  editingId = null;
  if (type === 'recipe') {
    resetRecipeForm();
    document.getElementById('r-save-btn').textContent = '🐰 レシピを保存する！';
    document.getElementById('r-save-btn').style.background = '';
  } else {
    resetFoodForm();
    document.getElementById('f-save-btn').textContent = '🐰 記録を保存する！';
    document.getElementById('f-save-btn').style.background = '';
  }
  const banner = document.getElementById('edit-banner');
  if (banner) banner.remove();
}

async function deleteRecord(id) {
  if (!confirm('この記録をけしますか？')) return;
  const r = (window._records || []).find(r => r.id === id);
  try {
    await window.dbDelete(id);
    closeModal();
    showToast('🗑️ けしたよ！');
  } catch(e) { alert('けすのにしっぱいしたよ。\n' + e.message); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return p[0] + '年' + p[1] + '月' + p[2] + '日';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// クイズ動作
// ============================================================
let quizQuestions = [], quizIndex = 0, quizScore = 0, quizAnswered = false;

function startQuiz(level) {
  const all = [...QUIZ_DATA[level]];
  // シャッフルして10問
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  quizQuestions = all.slice(0, 10);
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  document.getElementById('quiz-start-screen').style.display  = 'none';
  document.getElementById('quiz-result-screen').style.display = 'none';
  document.getElementById('quiz-play-screen').style.display   = 'block';
  showQuestion();
}

function showQuestion() {
  quizAnswered = false;
  const q = quizQuestions[quizIndex];
  const total = quizQuestions.length;
  // プログレスバー
  document.getElementById('quiz-prog-fill').style.width = ((quizIndex / total) * 100) + '%';
  document.getElementById('quiz-q-num').textContent = (quizIndex + 1) + ' / ' + total;
  document.getElementById('quiz-emoji').textContent = q.e;
  document.getElementById('quiz-question').textContent = q.q;
  document.getElementById('quiz-explain').textContent = '';
  document.getElementById('quiz-explain').classList.remove('show');
  document.getElementById('quiz-next-btn').classList.remove('show');
  // 選たくしをシャッフルして表示
  const indices = [0,1,2,3];
  for (let i = 3; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [indices[i],indices[j]]=[indices[j],indices[i]]; }
  const correctText = q.c[q.a];
  document.getElementById('quiz-choices').innerHTML = indices.map(i => {
    return '<button class="quiz-choice" onclick="answerQuiz(this,\'' + escHtml(q.c[i]) + '\',\'' + escHtml(correctText) + '\')">' + escHtml(q.c[i]) + '</button>';
  }).join('');
}

function answerQuiz(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIndex];
  const isCorrect = chosen === correct;
  if (isCorrect) quizScore++;
  // 全ボタンを正解・不正解で色分け
  document.querySelectorAll('.quiz-choice').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });
  // 解説表示
  const ex = document.getElementById('quiz-explain');
  ex.textContent = (isCorrect ? '✅ 正解！　' : '❌ ざんねん！　') + q.ex;
  ex.classList.add('show');
  document.getElementById('quiz-next-btn').classList.add('show');
  document.getElementById('quiz-next-btn').textContent =
    quizIndex + 1 >= quizQuestions.length ? '結果を見る 🎉' : '次の問題へ →';
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizQuestions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-play-screen').style.display   = 'none';
  document.getElementById('quiz-result-screen').style.display = 'block';
  const total = quizQuestions.length;
  document.getElementById('result-score').textContent = quizScore;
  document.getElementById('result-total').textContent = '/ ' + total + '問';
  const pct = quizScore / total;
  let rank, msg;
  if (pct >= 1.0)       { rank = '👑'; msg = 'かんぺき！！　りょうりの天才だ！'; }
  else if (pct >= 0.8)  { rank = '🥇'; msg = 'すごい！　もう少しで満点！'; }
  else if (pct >= 0.6)  { rank = '🥈'; msg = 'よくできました！　もっと上を目指そう！'; }
  else if (pct >= 0.4)  { rank = '🥉'; msg = 'もう少し！　また挑戦してみよう！'; }
  else                  { rank = '🐣'; msg = 'これから！　一しょにべんきょうしよう！'; }
  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-msg').textContent  = msg;
}

function showQuizStart() {
  document.getElementById('quiz-result-screen').style.display = 'none';
  document.getElementById('quiz-play-screen').style.display   = 'none';
  document.getElementById('quiz-start-screen').style.display  = 'block';
}

// ===== 🐰 コンベアベルト =====
const DEFAULT_FOODS = ['🍣','🍱','🍜','🍛','🍰','🥗','🍳','🍙','🍤','🥘','🍞','🥚','🍲','🍝','🥩','🍦','🍩','🥕','🍎','🧆'];
const SPEECH_MSGS   = ['おいしそう！','パクっ！','もぐもぐ♪','うまっ！','もっとちょうだい！','むしゃむしゃ！','いただきます！','さいこう！'];

let cvQueue      = [];
let cvItems      = [];   // { el, x, speed }
let cvSpawnTimer = null;
let cvSpeechTimer= null;
let cvEating     = false;
let cvRafId      = null;
let cvLastTime   = null;

function cvInit() {
  cvRefreshQueue();
  // rAFループ開始
  cvRafId = requestAnimationFrame(cvLoop);
  // 定期スポーン
  cvSpawnItem();
  cvSpawnTimer = setInterval(cvSpawnItem, 2400);
}

function cvLoop(ts) {
  if (!cvLastTime) cvLastTime = ts;
  const dt = Math.min(ts - cvLastTime, 100); // ms、最大100ms
  cvLastTime = ts;

  const clip = document.getElementById('conveyor-clip');
  if (clip) {
    const W = clip.offsetWidth;
    cvItems = cvItems.filter(item => {
      item.x -= item.speed * dt / 1000; // px/sec
      item.el.style.left = item.x + 'px';
      if (item.x < -80) {
        item.el.remove();
        return false;
      }
      // うさぎの口に届いたら食べる (x < 80px)
      if (!item.eaten && item.x < 80) {
        item.eaten = true;
        cvDoEat(item.data);
      }
      return true;
    });
  }
  cvRafId = requestAnimationFrame(cvLoop);
}

function cvRefreshQueue() {
  const records = (window._records || []);
  const named   = records.map(r => ({ emoji: cvEmojiForRecord(r), label: r.name }));
  const defaults= DEFAULT_FOODS.map(e => ({ emoji: e, label: null }));
  const pool = named.length > 0
    ? [...named, ...named, ...defaults].sort(() => Math.random() - .5)
    : defaults.slice().sort(() => Math.random() - .5);
  cvQueue = [...pool, ...pool];
}

function cvEmojiForRecord(r) {
  const map = { 'ごはん':'🍚','めん':'🍜','パン':'🍞','サラダ':'🥗','おかし':'🍰','にもの':'🍲','いためもの':'🍳','おつまみ':'🍻' };
  if (r.type === 'recipe' && r.category) {
    for (const [k,v] of Object.entries(map)) { if (r.category.includes(k)) return v; }
    return '📖';
  }
  return '🍽️';
}

function cvSpawnItem() {
  const clip = document.getElementById('conveyor-clip');
  if (!clip) return;
  if (cvQueue.length === 0) cvRefreshQueue();
  const data = cvQueue.shift();

  const el = document.createElement('div');
  el.className = 'cv-item';
  const startX = clip.offsetWidth + 10;
  el.style.left = startX + 'px';
  el.innerHTML = `
    <div class="cv-food">${data.emoji}</div>
    <div class="cv-plate"></div>
    ${data.label ? `<div class="cv-label">${escHtml(data.label.slice(0,8))}</div>` : ''}
  `;
  clip.appendChild(el);

  const speed = 60 + Math.random() * 30; // 60〜90 px/sec
  cvItems.push({ el, x: startX, speed, data, eaten: false });
}

function cvDoEat(item) {
  if (cvEating) return;
  cvEating = true;
  const bunny  = document.getElementById('cv-bunny');
  const speech = document.getElementById('cv-speech');
  if (!bunny || !speech) return;

  bunny.classList.remove('nom','happy','bounce-in');
  void bunny.offsetWidth;
  bunny.classList.add('nom');

  const wrap = document.getElementById('cv-bunny-wrap');
  const rect = wrap ? wrap.getBoundingClientRect() : { left:14, top:60, width:50 };
  speech.style.left = (rect.left + rect.width + 8) + 'px';
  speech.style.top  = (rect.top - 14) + 'px';

  const msg = item.label
    ? `${item.label.slice(0,6)}、うまっ！`
    : SPEECH_MSGS[Math.floor(Math.random() * SPEECH_MSGS.length)];
  speech.textContent = msg;
  speech.classList.add('show');

  if (cvSpeechTimer) clearTimeout(cvSpeechTimer);
  cvSpeechTimer = setTimeout(() => {
    speech.classList.remove('show');
    cvEating = false;
  }, 1400);
}

// アクションリアクション
function cvReact(type) {
  const bunny  = document.getElementById('cv-bunny');
  const speech = document.getElementById('cv-speech');
  if (!bunny || !speech) return;
  bunny.classList.remove('nom','happy','bounce-in');
  void bunny.offsetWidth;
  const msgs = {
    save:  ['ほぞんしたよ！','やったね！','もっとかいて！'],
    page:  ['どこいくの？','あそぼ！','みてるよ！'],
    input: ['がんばって！','おいしそう！','なんのりょうり？'],
    quiz:  ['クイズ！？','むずかしいな〜','わかるかな？'],
  };
  const pool = msgs[type] || msgs.page;
  const wrap = document.getElementById('cv-bunny-wrap');
  const rect = wrap ? wrap.getBoundingClientRect() : { left:14, top:60, width:50 };
  speech.style.left = (rect.left + rect.width + 8) + 'px';
  speech.style.top  = (rect.top - 14) + 'px';
  speech.textContent = pool[Math.floor(Math.random() * pool.length)];
  speech.classList.add('show');
  bunny.classList.add(type === 'save' ? 'happy' : 'bounce-in');
  if (cvSpeechTimer) clearTimeout(cvSpeechTimer);
  cvSpeechTimer = setTimeout(() => { speech.classList.remove('show'); cvEating = false; }, 1600);
}

// 記録が更新されたらキューを更新
document.getElementById('r-name').addEventListener('input', () => { if(typeof cvReact==='function') cvReact('input'); });
document.getElementById('f-name').addEventListener('input', () => { if(typeof cvReact==='function') cvReact('input'); });

// すぐに開始（DOMContentLoadedが済んでいる場合）
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  setTimeout(cvInit, 600);
}

document.getElementById('r-date').value = today();
document.getElementById('f-date').value = today();
</script>
